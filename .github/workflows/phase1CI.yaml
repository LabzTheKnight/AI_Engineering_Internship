name: Phase 1 Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        cd projects/phase-1 
        pip install -r requirements.txt
    - name: Test with pytest
      run: |
        cd projects/phase-1 
        pip install pytest
        pytest test.py